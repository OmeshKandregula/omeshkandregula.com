<!DOCTYPE html>
<html>
<head><style>
  body { background: #1a1a1a; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; font-family: sans-serif; gap: 48px; flex-wrap: wrap; }
  .item { display: flex; flex-direction: column; align-items: center; gap: 12px; color: #666; font-size: 11px; }
  img { image-rendering: crisp-edges; }
</style></head>
<body>
  <div class="item">
    <img src="/favicon.svg" width="16" height="16"/>
    <span>16×16 (tab)</span>
  </div>
  <div class="item">
    <img src="/favicon.svg" width="32" height="32"/>
    <span>32×32</span>
  </div>
  <div class="item">
    <img src="/favicon.svg" width="64" height="64"/>
    <span>64×64</span>
  </div>
  <div class="item">
    <img src="/favicon.svg" width="128" height="128"/>
    <span>128×128</span>
  </div>
  <div class="item">
    <img src="/favicon.svg" width="256" height="256"/>
    <span>256×256</span>
  </div>
</body>
</html>
